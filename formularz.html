<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern - Choose Your Favorite Drink</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
    <script src="form.js" defer></script>
</head>
<body>
<header class="site-header">
    <nav class="navbar">
        <div class="nav-left">
            </div>
        <div class="nav-logo">
            <img src="img/logo.png" alt="Brand Logo">
            <span class="logo-name">THIRSTY</span>
        </div>
    </nav>
</header>
<main>
    <aside class="cart-sidebar">
        <div class="cart-header">
            <h2>Twoje zamówienie (Koszyk)</h2>
        </div>
        
        <div class="cart-items" id="cart-items-container"></div>
        
        <div class="cart-summary">
            <div class="total-row">
                <span>Suma</span>
                <span class="total-price" id="cart-total-price">$0.00</span>
            </div>
            </div>
    </aside> 
<div class="form-container">
    <h1>Dostawa</h1>
    <p>Wprowadź swoje dane aby dokończyć zakup</p>
    <form id="order-form">
        <input type="text" id="first-name" placeholder="Imię" required>
        <input type="text" id="last-name" placeholder="Nazwisko" required>
        <input type="text" id="address" placeholder="Adres" required>
        <button type="submit" class="submit-btn">Potwierdź</button>
    </form>
</div>
<a href="index.html" class="back-link">Wróć do sklepu</a>

</main>
</body>
</html>

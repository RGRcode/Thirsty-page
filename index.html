<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern - Choose Your Favorite Drink</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
</head>
<body>
<header class="site-header">
    <nav class="navbar">
        <div class="nav-left">
            </div>
        <div class="nav-logo">
            <img src="img/logo.png" alt="Brand Logo">
            <span class="logo-name">THIRSTY</span>
        </div>
    </nav>
</header>
<main>
    <section id="products">
        <h1>Wybierz swój napój</h1>
        
        <div class="products-grid">
            
            <article class="product-card">
                <div class="product-image">
                    <img src="img/black.jpg" alt="Black Energy">
                </div>
                <div class="product-info">
                    <h2>Black</h2>
                    <span class="product-size">250ml</span>
                    <div class="product-footer">
                        <span class="product-price">$3.00</span>
                        <button class="add-to-cart-btn" data-id="1">Do koszyka</button>
                    </div>
                </div>
            </article>

            <article class="product-card">
                <div class="product-image">
                    <img src="img/cola.jpg" alt="Coca Cola">
                </div>
                <div class="product-info">
                    <h2>Coca Cola</h2>
                    <span class="product-size">330ml</span>
                    <div class="product-footer">
                        <span class="product-price">$2.00</span>
                        <button class="add-to-cart-btn" data-id="2">Do koszyka</button>
                    </div>
                </div>
            </article>

            <article class="product-card">
                <div class="product-image">
                    <img src="img/cola_zero.jpg" alt="Coca Cola Zero">
                </div>
                <div class="product-info">
                    <h2>Coca Cola Zero</h2>
                    <span class="product-size">330ml</span>
                    <div class="product-footer">
                        <span class="product-price">$2.00</span>
                        <button class="add-to-cart-btn" data-id="3">Do koszyka</button>
                    </div>
                </div>
            </article>

            <article class="product-card">
                <div class="product-image">
                    <img src="img/dzikgrape.jpg" alt="Dzik Grape">
                </div>
                <div class="product-info">
                    <h2>Dzik Grape</h2>
                    <span class="product-size">500ml</span>
                    <div class="product-footer">
                        <span class="product-price">$4.00</span>
                        <button class="add-to-cart-btn" data-id="4">Do koszyka</button>
                    </div>
                </div>
            </article>

            <article class="product-card">
                <div class="product-image">
                    <img src="img/fanta.jpg" alt="Fanta">
                </div>
                <div class="product-info">
                    <h2>Fanta</h2>
                    <span class="product-size">330ml</span>
                    <div class="product-footer">
                        <span class="product-price">$2.20</span>
                        <button class="add-to-cart-btn" data-id="5">Do koszyka</button>
                    </div>
                </div>
            </article>

            <article class="product-card">
                <div class="product-image">
                    <img src="img/mountain.jpg" alt="Mountain Dew">
                </div>
                <div class="product-info">
                    <h2>Mountain Dew</h2>
                    <span class="product-size">330ml</span>
                    <div class="product-footer">
                        <span class="product-price">$2.50</span>
                        <button class="add-to-cart-btn" data-id="6">Do koszyka</button>
                    </div>
                </div>
            </article>

            <article class="product-card">
                <div class="product-image">
                    <img src="img/pepsi.jpg" alt="Pepsi">
                </div>
                <div class="product-info">
                    <h2>Pepsi</h2>
                    <span class="product-size">330ml</span>
                    <div class="product-footer">
                        <span class="product-price">$2.00</span>
                        <button class="add-to-cart-btn" data-id="7">Do koszyka</button>
                    </div>
                </div>
            </article>

            <article class="product-card">
                <div class="product-image">
                    <img src="img/pepsi_zero.jpg" alt="Pepsi Zero">
                </div>
                <div class="product-info">
                    <h2>Pepsi Zero</h2>
                    <span class="product-size">330ml</span>
                    <div class="product-footer">
                        <span class="product-price">$2.00</span>
                        <button class="add-to-cart-btn" data-id="8">Do koszyka</button>
                    </div>
                </div>
            </article>

            <article class="product-card">
                <div class="product-image">
                    <img src="img/redbull.jpg" alt="Red Bull">
                </div>
                <div class="product-info">
                    <h2>Red Bull</h2>
                    <span class="product-size">250ml</span>
                    <div class="product-footer">
                        <span class="product-price">$3.50</span>
                        <button class="add-to-cart-btn" data-id="9">Do koszyka</button>
                    </div>
                </div>
            </article>

            <article class="product-card">
                <div class="product-image">
                    <img src="img/redbull_zero.jpg" alt="Red Bull Zero">
                </div>
                <div class="product-info">
                    <h2>Red Bull Zero</h2>
                    <span class="product-size">250ml</span>
                    <div class="product-footer">
                        <span class="product-price">$3.50</span>
                        <button class="add-to-cart-btn" data-id="10">Do koszyka</button>
                    </div>
                </div>
            </article>

        </div>
    </section>

    <aside class="cart-sidebar">
        <div class="cart-header">
            <h2>Cart</h2>
        </div>
        
        <div class="cart-items" id="cart-items-container">
        </div>
        <div class="cart-summary">
            <div class="total-row">
                <span>Suma</span>
                <span class="total-price" id="cart-total-price">0</span>
            </div>
            <button class="order-btn">Zamów</button>
        </div>
    </aside>
</main>
</body>
